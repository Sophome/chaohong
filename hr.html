<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超红传媒 · 能力画像</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:#0b0f17;
      --bg-soft:#111827;
      --card:rgba(18,24,37,.92);
      --card-2:rgba(23,31,47,.88);
      --text:#f8fafc;
      --soft:#d7dee8;
      --muted:#94a3b8;
      --line:rgba(148,163,184,.16);
      --accent:#38bdf8;
      --accent2:#818cf8;
      --shadow:0 4px 20px rgba(0,0,0,.28);
    }
    html[data-theme="light"] {
      color-scheme: light;
      --bg:#f4f7fb;
      --bg-soft:#eef3f8;
      --card:rgba(255,255,255,.92);
      --card-2:rgba(248,250,252,.96);
      --text:#111827;
      --soft:#334155;
      --muted:#64748b;
      --line:rgba(15,23,42,.1);
      --accent:#2563eb;
      --accent2:#7c3aed;
      --shadow:0 4px 20px rgba(15,23,42,.06);
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:
        radial-gradient(circle at 8% 0%, color-mix(in srgb,var(--accent) 15%,transparent), transparent 30%),
        radial-gradient(circle at 88% 8%, color-mix(in srgb,var(--accent2) 12%,transparent), transparent 28%),
        linear-gradient(180deg,var(--bg),var(--bg-soft) 48%,var(--bg));
    }

    .page { max-width:1200px; margin:0 auto; padding:28px 24px 56px; }

    /* ── HEADER ── */
    .header {
      display:flex; align-items:center; justify-content:space-between;
      gap:14px; margin-bottom:18px; flex-wrap:wrap;
    }
    .brand { display:flex; align-items:center; gap:12px; }
    .logo {
      width:38px; height:38px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; font-size:14px; font-weight:700; flex-shrink:0;
    }
    .brand-text h1 { font-size:1.2rem; font-weight:700; line-height:1.3; }
    .brand-text span { font-size:0.76rem; color:var(--muted); }
    .theme-btn {
      border:1.5px solid var(--line); background:var(--card-2);
      color:var(--text); border-radius:16px; padding:6px 14px;
      cursor:pointer; font-size:0.78rem; font-family:inherit;
      transition:background 0.2s;
    }
    .theme-btn:hover { background:var(--card); }

    /* ── NAV PILLS ── */
    .nav-links { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:28px; }
    .nav-pill {
      display:inline-flex; align-items:center; gap:4px;
      padding:5px 14px; border-radius:16px; font-size:0.78rem;
      text-decoration:none; border:1.5px solid var(--line);
      color:var(--muted); background:var(--card-2);
      transition:all 0.2s;
    }
    .nav-pill:not(.active):hover { border-color:var(--accent); color:var(--accent); }
    .nav-pill.active {
      background:var(--accent); color:#fff; border-color:var(--accent);
      pointer-events:none; font-weight:600;
    }

    /* ── SECTION ── */
    .sec { margin-bottom:36px; }
    .sec-head {
      display:flex; align-items:center; gap:10px;
      margin-bottom:14px; padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }
    .sec-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
    .sec-title { font-size:1.18rem; font-weight:700; }
    .sec-count { font-size:0.82rem; color:var(--muted); background:var(--bg-soft); border-radius:8px; padding:2px 9px; }

    /* ── CARDS GRID ── */
    .grid {
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
    }
    .card {
      border:1px solid var(--line);
      background:var(--card-2);
      border-radius:14px; padding:18px;
      text-decoration:none; color:inherit;
      display:flex; flex-direction:column; gap:8px;
      box-shadow:var(--shadow);
      transition:transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor:pointer;
    }
    .card:hover { transform:translateY(-2px); border-color:var(--accent); box-shadow:0 8px 28px rgba(0,0,0,.24); }
    .card-row { display:flex; align-items:center; gap:7px; }
    .card-icon { font-size:1.2rem; flex-shrink:0; }
    .card-name { font-size:1.08rem; font-weight:700; line-height:1.35; }
    .card-desc { font-size:0.85rem; color:var(--muted); line-height:1.55; flex:1; }
    .card-arr { font-size:0.82rem; color:var(--accent); opacity:0; transition:opacity 0.2s; margin-top:auto; }
    .card:hover .card-arr { opacity:1; }

    /* ── DOT COLORS ── */
    .d-content  .sec-dot { background:#fb7299; }
    .d-mgmt     .sec-dot { background:#f97316; }

    /* ── FOOTER ── */
    .foot {
      text-align:center; padding:18px 0;
      font-size:0.74rem; color:var(--muted);
      border-top:1px solid var(--line); margin-top:8px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width:820px) { .grid { grid-template-columns:repeat(2, minmax(0,1fr)); } }
    @media (max-width:480px) { .grid { grid-template-columns:1fr; } .page { padding:20px 16px 40px; } }
  </style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="logo">超红</div>
      <div class="brand-text">
        <h1>能力画像</h1>
        <span>超红传媒 · HR 人才标准与岗位画像</span>
      </div>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️ 浅色</button>
  </div>

  <!-- NAV PILLS -->
  <div class="nav-links">
    <span class="nav-pill active">👤 能力画像</span>
  </div>

  <!-- 内容创作 -->
  <div class="sec d-content">
    <div class="sec-head">
      <div class="sec-dot"></div>
      <span class="sec-title">内容创作</span>
      <span class="sec-count">2 篇</span>
    </div>
    <div class="grid">
      <a class="card" href="hr-profile-director.html" target="_blank">
        <div class="card-row">
          <span class="card-icon">🎬</span>
          <span class="card-name">B站长视频编导核心能力画像</span>
        </div>
        <div class="card-desc">B站长视频编导岗位核心能力维度与人才标准</div>
        <div class="card-arr">打开 →</div>
      </a>
      <a class="card" href="hr-profile-editor.html" target="_blank">
        <div class="card-row">
          <span class="card-icon">🎞️</span>
          <span class="card-name">B站长视频摄影剪辑核心能力画像</span>
        </div>
        <div class="card-desc">B站长视频摄影剪辑岗位核心能力维度与人才标准</div>
        <div class="card-arr">打开 →</div>
      </a>
    </div>
  </div>

  <!-- 管理层 -->
  <div class="sec d-mgmt">
    <div class="sec-head">
      <div class="sec-dot"></div>
      <span class="sec-title">管理层</span>
      <span class="sec-count">1 篇</span>
    </div>
    <div class="grid">
      <a class="card" href="hr-profile-ceo.html" target="_blank">
        <div class="card-row">
          <span class="card-icon">🏢</span>
          <span class="card-name">传媒公司总经理能力画像</span>
        </div>
        <div class="card-desc">传媒公司总经理岗位核心能力维度与领导力标准</div>
        <div class="card-arr">打开 →</div>
      </a>
    </div>
  </div>

  <div class="foot">超红传媒 &nbsp;·&nbsp; 能力画像 &nbsp;·&nbsp; 3 篇 &nbsp;·&nbsp; 2026</div>

</div><!-- /page -->

<script>
  (function() {
    const saved = localStorage.getItem('chaohong-hr-theme');
    const theme = saved || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    updateBtn(theme);
  })();

  function updateBtn(theme) {
    const btn = document.getElementById('themeBtn');
    if (!btn) return;
    btn.textContent = theme === 'dark' ? '☀️ 浅色' : '🌙 深色';
  }

  function toggleTheme() {
    const html = document.documentElement;
    const cur = html.getAttribute('data-theme') || 'dark';
    const next = cur === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('chaohong-hr-theme', next);
    updateBtn(next);
  }
</script>
</body>
</html>
