<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超红传媒 · 选题清单</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:#0b0f17;
      --bg-soft:#111827;
      --card:rgba(18,24,37,.92);
      --card-2:rgba(23,31,47,.88);
      --text:#f8fafc;
      --soft:#d7dee8;
      --muted:#94a3b8;
      --line:rgba(148,163,184,.16);
      --accent:#38bdf8;
      --accent2:#818cf8;
      --shadow:0 4px 20px rgba(0,0,0,.28);
    
      --header-bg: linear-gradient(135deg,#4f6ef7 0%,#7c3aed 100%);
      --header-text: #fff;
      --toggle-bg: rgba(255,255,255,0.2);}
    html[data-theme="light"] {
      color-scheme: light;
      --bg:#f4f7fb;
      --bg-soft:#eef3f8;
      --card:rgba(255,255,255,.92);
      --card-2:rgba(248,250,252,.96);
      --text:#111827;
      --soft:#334155;
      --muted:#64748b;
      --line:rgba(15,23,42,.1);
      --accent:#2563eb;
      --accent2:#7c3aed;
      --shadow:0 4px 20px rgba(15,23,42,.06);
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:
        radial-gradient(circle at 8% 0%, color-mix(in srgb,var(--accent) 15%,transparent), transparent 30%),
        radial-gradient(circle at 88% 8%, color-mix(in srgb,var(--accent2) 12%,transparent), transparent 28%),
        linear-gradient(180deg,var(--bg),var(--bg-soft) 48%,var(--bg));
    }

    .page { max-width:1200px; margin:0 auto; padding:28px 24px 56px; }

    /* ── HEADER ── */
    .header {
      display:flex; align-items:center; justify-content:space-between;
      gap:14px; margin-bottom:18px; flex-wrap:wrap;
    }
    .brand { display:flex; align-items:center; gap:12px; }
    .logo {
      width:38px; height:38px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; font-size:14px; font-weight:700; flex-shrink:0;
    }
    .brand-text h1 { font-size:1.2rem; font-weight:700; line-height:1.3; }
    .brand-text span { font-size:0.76rem; color:var(--muted); }
    .header-tags { display:flex; gap:7px; flex-wrap:wrap; }
    .h-tag {
      font-size:0.76rem; padding:5px 13px; border-radius:16px;
      border:1.5px solid var(--line); color:var(--muted);
      text-decoration:none; background:var(--card-2);
      transition:all 0.2s; cursor:pointer;
    }
    .h-tag:hover { border-color:var(--accent); color:var(--accent); }
    .theme-btn {
      border:1.5px solid var(--line); background:var(--card-2);
      color:var(--text); border-radius:16px; padding:6px 14px;
      cursor:pointer; font-size:0.78rem; font-family:inherit;
      transition:background 0.2s;
    }
    .theme-btn:hover { background:var(--card); }

    /* ── NAV PILLS ── */
    .nav-links { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:22px; }
    .nav-pill {
      display:inline-flex; align-items:center; gap:4px;
      padding:5px 14px; border-radius:16px; font-size:0.78rem;
      text-decoration:none; border:1.5px solid var(--line);
      color:var(--muted); background:var(--card-2);
      transition:all 0.2s;
    }
    .nav-pill:not(.active):hover { border-color:var(--accent); color:var(--accent); }
    .nav-pill.active {
      background:var(--accent); color:#fff; border-color:var(--accent);
      pointer-events:none; font-weight:600;
    }

    /* ── SECTION ── */
    .sec { margin-bottom:32px; }
    .sec-head {
      display:flex; align-items:center; gap:10px;
      margin-bottom:14px; padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }
    .sec-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
    .sec-title { font-size:1.18rem; font-weight:700; }
    .sec-count { font-size:0.82rem; color:var(--muted); background:var(--bg-soft); border-radius:8px; padding:2px 9px; }

    /* ── CARDS GRID ── */
    .grid {
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
    }
    .card {
      border:1px solid var(--line);
      background:var(--card-2);
      border-radius:14px; padding:18px;
      text-decoration:none; color:inherit;
      display:flex; flex-direction:column; gap:8px;
      box-shadow:var(--shadow);
      transition:transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor:pointer;
    }
    .card:hover { transform:translateY(-2px); border-color:var(--accent); box-shadow:0 8px 28px rgba(0,0,0,.24); }
    .card-row { display:flex; align-items:center; gap:7px; }
    .card-icon { font-size:1.2rem; flex-shrink:0; }
    .card-name { font-size:1.08rem; font-weight:700; line-height:1.35; }
    .card-desc { font-size:0.85rem; color:var(--muted); line-height:1.55; flex:1; }
    .card-arr { font-size:0.82rem; color:var(--accent); opacity:0; transition:opacity 0.2s; margin-top:auto; }
    .card:hover .card-arr { opacity:1; }

    /* ── HEADER (index style) ── */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 44px 0 36px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content:"";
      position: absolute;
      top: -60px; right: -60px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .header::after {
      content:"";
      position: absolute;
      bottom: -80px; left: 30%;
      width: 400px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .header-inner { max-width: 1200px; margin: 0 auto; position: relative; z-index:1; padding: 0 24px; box-sizing: border-box; }
    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 0.92rem;
      opacity: 0.78;
      line-height: 1.5;
    }
    .header-meta {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 14px;
      border-radius: 20px;
      background: var(--toggle-bg);
      font-size: 0.78rem;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }
    .toggle-btn {
      position: absolute;
      top: 14px; right: 24px;
      z-index: 5;
      border: none;
      background: var(--toggle-bg);
      color: var(--header-text);
      padding: 7px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.2s;
    }
    .toggle-btn:hover { background: rgba(255,255,255,0.15); }

/* ── DOT COLORS ── */
    .d-kit    .sec-dot { background:#ef4444; }
    .d-movie  .sec-dot { background:#f97316; }
    .d-clean  .sec-dot { background:#10b981; }
    .d-env    .sec-dot { background:#14b8a6; }
    .d-digital .sec-dot { background:#f43f5e; }

    /* ── FOOTER ── */
    .foot {
      text-align:center; padding:18px 0;
      font-size:0.74rem; color:var(--muted);
      border-top:1px solid var(--line); margin-top:8px;
    }

    /* ── PASSWORD GATE ── */

    catch(e) { return null; }
  }

    tick();
  }

    }
    f.count = (f.count || 0) + 1;

  }

  // Init — check shared auth first, then fails lock
  (function() {
    const saved = localStorage.getItem("chaohong-theme");
    const theme = saved || "light";
    document.documentElement.setAttribute("data-theme", theme);
    const icon = document.getElementById("toggleIcon");
    const text = document.getElementById("toggleText");
    if (icon && text) {
      icon.textContent = theme === "dark" ? "🌙" : "☀️";
      text.textContent = theme === "dark" ? "深色" : "浅色";
    }
  })();

  /* ── THEME ── */
  (function() {
    const saved = localStorage.getItem('chaohong-list-theme');
    const theme = saved || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    updateBtn(theme);
  })();

  function updateBtn(theme) {
    const btn = document.getElementById('themeBtn');
    if (!btn) return;
    btn.textContent = theme === 'dark' ? '☀️ 浅色' : '🌙 深色';
  }

  function toggleTheme() {
    const html = document.documentElement;
    const cur = html.getAttribute("data-theme") || "light";
    const next = cur === "dark" ? "light" : "dark";
    html.setAttribute("data-theme", next);
    localStorage.setItem("chaohong-theme", next);
    const icon = document.getElementById("toggleIcon");
    const text = document.getElementById("toggleText");
    if (icon && text) {
      icon.textContent = next === "dark" ? "🌙" : "☀️";
      text.textContent = next === "dark" ? "深色" : "浅色";
    }
  }

  document.querySelectorAll('a[href^="#"]').forEach(function(a) {
    a.addEventListener('click', function(e) {
      const id = this.getAttribute('href').slice(1);
      const el = document.getElementById(id);
      if (el) {
        e.preventDefault();
        const top = el.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top, behavior:'smooth' });
      }
    });
  });
</script>
</body>
</html>
