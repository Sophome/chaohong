<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>超红传媒｜空气净化器内容规划表</title>

  <style>
    :root {
      color-scheme: dark;
      --bg:#0b0f17;
      --bg-soft:#111827;
      --card:rgba(18,24,37,.92);
      --card-2:rgba(23,31,47,.92);
      --head:#1f2937;
      --hover:rgba(56,189,248,.06);
      --text:#f8fafc;
      --soft:#d7dee8;
      --muted:#94a3b8;
      --line:rgba(148,163,184,.18);
      --line2:rgba(148,163,184,.12);
      --accent:#38bdf8;
      --accent2:#818cf8;
      --accent3:#2dd4bf;
      --business:#f59e0b;
      --user:#38bdf8;
      --rank:#22c55e;
      --shadow:0 22px 60px rgba(0,0,0,.36);
    }

    html[data-theme="light"] {
      color-scheme: light;
      --bg:#f4f7fb;
      --bg-soft:#eef3f8;
      --card:rgba(255,255,255,.92);
      --card-2:rgba(248,250,252,.96);
      --head:#e8eef6;
      --hover:rgba(37,99,235,.055);
      --text:#111827;
      --soft:#334155;
      --muted:#64748b;
      --line:rgba(15,23,42,.12);
      --line2:rgba(15,23,42,.08);
      --accent:#2563eb;
      --accent2:#7c3aed;
      --accent3:#0f766e;
      --business:#d97706;
      --user:#2563eb;
      --rank:#16a34a;
      --shadow:0 22px 60px rgba(15,23,42,.08);
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:
        radial-gradient(circle at 8% 0%, color-mix(in srgb,var(--accent) 18%,transparent), transparent 32%),
        radial-gradient(circle at 88% 8%, color-mix(in srgb,var(--accent2) 15%,transparent), transparent 30%),
        radial-gradient(circle at 78% 96%, color-mix(in srgb,var(--accent3) 12%,transparent), transparent 34%),
        linear-gradient(180deg,var(--bg),var(--bg-soft) 48%,var(--bg));
    }

    .page {
      width:min(1480px,calc(100% - 40px));
      margin:0 auto;
      padding:28px 0 56px;
    }

    .topbar,
    .card,
    .section,
    .footer {
      border:1px solid var(--line);
      background:var(--card);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
    }

    .topbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
      padding:16px 18px;
      border-radius:20px;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .logo {
      width:42px;
      height:42px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      color:#fff;
      font-size:15px;
      font-weight:700;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
    }

    .brand-title {
      font-size:clamp(18px,1.5vw,21px);
      line-height:1.3;
      font-weight:650;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .theme-toggle {
      border:1px solid var(--line);
      background:var(--card-2);
      color:var(--text);
      border-radius:999px;
      padding:10px 15px;
      cursor:pointer;
      font-size:14px;
    }

    .summary {
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:16px;
      margin-bottom:18px;
    }

    .card {
      border-radius:20px;
      padding:20px;
    }

    .card h2 {
      margin:0 0 10px;
      font-size:clamp(17px,1.2vw,20px);
    }

    .card p,
    .footer p,
    .note {
      color:var(--muted);
      line-height:1.75;
      font-size:15px;
    }

    .business-color { color:var(--business); }
    .user-color { color:var(--user); }
    .rank-color { color:var(--rank); }

    .section {
      margin-bottom:18px;
      border-radius:28px;
      padding:22px;
    }

    .section-title {
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:18px;
      margin-bottom:16px;
    }

    .section-title h1,
    .section-title h2 {
      margin:0;
      font-size:clamp(26px,2.4vw,38px);
      line-height:1.16;
      letter-spacing:-.04em;
    }

    .section-title span {
      max-width:760px;
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
      text-align:right;
    }

    .table {
      border:1px solid var(--line2);
      border-radius:18px;
      overflow:hidden;
      background:var(--card-2);
    }

    .row {
      display:flex;
      border-bottom:1px solid var(--line2);
    }

    .row:last-child { border-bottom:none; }
    .row:not(.header):hover { background:var(--hover); }
    .header { background:var(--head); }

    .cell {
      min-width:0;
      padding:14px 16px;
      border-right:1px solid var(--line2);
      display:flex;
      align-items:center;
      font-size:15px;
      line-height:1.5;
    }

    .cell:last-child { border-right:none; }

    .header .cell {
      justify-content:center;
      text-align:center;
      font-weight:700;
      font-size:14px;
    }

    .c-node { flex:0 0 116px; justify-content:center; text-align:center; color:var(--soft); }
    .c-type { flex:0 0 146px; justify-content:center; }
    .c-cat { flex:0 0 160px; justify-content:center; text-align:center; color:var(--soft); }
    .c-title { flex:1.65; }
    .c-value { flex:1.12; color:var(--muted); font-size:14.5px; }

    .tag {
      min-width:82px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 11px;
      border-radius:999px;
      border:1px solid currentColor;
      background:color-mix(in srgb,currentColor 8%,transparent);
      font-size:13px;
      white-space:nowrap;
    }

    .type-business { color:var(--business); }
    .type-user { color:var(--user); }
    .type-rank { color:var(--rank); }

    .ellipsis {
      display:block;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .note {
      margin:14px 0 0;
      font-size:14px;
    }

    .note strong { color:var(--text); }

    .footer {
      border-radius:28px;
      padding:22px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }

    .footer h2 {
      margin:0 0 8px;
      font-size:clamp(18px,1.35vw,22px);
    }

    .footer p { margin:0; }

    @media (max-width:1100px) {
      .summary,
      .footer { grid-template-columns:1fr; }
    }

    @media (max-width:900px) {
      .page {
        width:min(100% - 24px,760px);
        padding-top:18px;
      }

      .topbar { align-items:flex-start; }
      .brand-title { white-space:normal; }

      .section-title {
        flex-direction:column;
        align-items:flex-start;
      }

      .section-title span { text-align:left; }

      .table {
        border:none;
        background:transparent;
        display:grid;
        gap:12px;
      }

      .header { display:none; }

      .row {
        display:grid;
        grid-template-columns:1fr;
        border:1px solid var(--line2);
        border-radius:16px;
        overflow:hidden;
        background:var(--card-2);
      }

      .cell {
        border-right:none;
        border-bottom:1px solid var(--line2);
      }

      .cell:last-child { border-bottom:none; }

      .cell::before {
        content:attr(data-label);
        flex:0 0 88px;
        color:var(--muted);
        font-size:13px;
        font-weight:700;
      }

      .c-node,
      .c-type,
      .c-cat,
      .c-title,
      .c-value {
        flex:none;
        justify-content:flex-start;
        text-align:left;
      }

      .ellipsis { white-space:normal; }
    }

    @media (max-width:560px) {
      .topbar { flex-direction:column; }
      .theme-toggle { width:100%; }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <div class="logo">超红</div>
        <div class="brand-title">超红传媒｜空气净化器内容规划表</div>
      </div>
      <button class="theme-toggle" id="themeBtn" type="button">切换浅色</button>
    </header>

    <section class="summary">
      <div class="card">
        <h2 class="business-color">01 商单案例型内容</h2>
        <p>展示品牌合作能力，包括除甲醛空气净化器、母婴空气净化器、宠物家庭净化器、大空间净化器、除菌除病毒、过敏鼻炎场景、滤芯更换和真实家庭空气质量实测。</p>
      </div>

      <div class="card">
        <h2 class="user-color">02 用户决策型内容</h2>
        <p>解决用户在 CADR、CCM、HEPA 等级、活性炭、甲醛分解、颗粒物净化、噪音、适用面积、滤芯寿命、传感器准确性和预算上的选购困惑。</p>
      </div>

      <div class="card">
        <h2 class="rank-color">03 空气净化器推荐排行榜</h2>
        <p>沉淀长期搜索流量，包括除甲醛净化器、母婴净化器、宠物净化器、卧室净化器、大客厅净化器、鼻炎过敏人群、新房装修和大促榜单。</p>
      </div>
    </section>

    <section class="section">
      <div class="section-title">
        <h1>消费节点内容规划表</h1>
        <span>围绕装修季、618、梅雨季/暑期、开学季、国庆
