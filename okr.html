<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超红传媒 · OKR 目标管理</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:#0b0f17;
      --bg-soft:#111827;
      --card:rgba(18,24,37,.92);
      --card-2:rgba(23,31,47,.88);
      --text:#f8fafc;
      --soft:#d7dee8;
      --muted:#94a3b8;
      --line:rgba(148,163,184,.16);
      --accent:#38bdf8;
      --accent2:#818cf8;
      --shadow:0 4px 20px rgba(0,0,0,.28);
    }
    html[data-theme="light"] {
      color-scheme: light;
      --bg:#f4f7fb;
      --bg-soft:#eef3f8;
      --card:rgba(255,255,255,.92);
      --card-2:rgba(248,250,252,.96);
      --text:#111827;
      --soft:#334155;
      --muted:#64748b;
      --line:rgba(15,23,42,.1);
      --accent:#2563eb;
      --accent2:#7c3aed;
      --shadow:0 4px 20px rgba(15,23,42,.06);
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:
        radial-gradient(circle at 8% 0%, color-mix(in srgb,var(--accent) 15%,transparent), transparent 30%),
        radial-gradient(circle at 88% 8%, color-mix(in srgb,var(--accent2) 12%,transparent), transparent 28%),
        linear-gradient(180deg,var(--bg),var(--bg-soft) 48%,var(--bg));
    }

    .page { max-width:1200px; margin:0 auto; padding:28px 24px 56px; }

    /* ── HEADER ── */
    .header {
      display:flex; align-items:center; justify-content:space-between;
      gap:14px; margin-bottom:18px; flex-wrap:wrap;
    }
    .brand { display:flex; align-items:center; gap:12px; }
    .logo {
      width:38px; height:38px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; font-size:14px; font-weight:700; flex-shrink:0;
    }
    .brand-text h1 { font-size:1.2rem; font-weight:700; line-height:1.3; }
    .brand-text span { font-size:0.76rem; color:var(--muted); }
    .theme-btn {
      border:1.5px solid var(--line); background:var(--card-2);
      color:var(--text); border-radius:16px; padding:6px 14px;
      cursor:pointer; font-size:0.78rem; font-family:inherit;
      transition:background 0.2s;
    }
    .theme-btn:hover { background:var(--card); }

    /* ── NAV PILLS ── */
    .nav-links { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:28px; }
    .nav-pill {
      display:inline-flex; align-items:center; gap:4px;
      padding:5px 14px; border-radius:16px; font-size:0.78rem;
      text-decoration:none; border:1.5px solid var(--line);
      color:var(--muted); background:var(--card-2);
      transition:all 0.2s;
    }
    .nav-pill:not(.active):hover { border-color:var(--accent); color:var(--accent); }
    .nav-pill.active {
      background:var(--accent); color:#fff; border-color:var(--accent);
      pointer-events:none; font-weight:600;
    }

    /* ── SECTION ── */
    .sec { margin-bottom:36px; }
    .sec-head {
      display:flex; align-items:center; gap:10px;
      margin-bottom:14px; padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }
    .sec-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
    .sec-title { font-size:1.18rem; font-weight:700; }
    .sec-count { font-size:0.82rem; color:var(--muted); background:var(--bg-soft); border-radius:8px; padding:2px 9px; }

    /* ── CARDS GRID ── */
    .grid {
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
    }
    .card {
      border:1px solid var(--line);
      background:var(--card-2);
      border-radius:14px; padding:18px;
      text-decoration:none; color:inherit;
      display:flex; flex-direction:column; gap:8px;
      box-shadow:var(--shadow);
      transition:transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor:pointer;
    }
    .card:hover { transform:translateY(-2px); border-color:var(--accent); box-shadow:0 8px 28px rgba(0,0,0,.24); }
    .card-row { display:flex; align-items:center; gap:7px; }
    .card-icon { font-size:1.2rem; flex-shrink:0; }
    .card-name { font-size:1.08rem; font-weight:700; line-height:1.35; }
    .card-desc { font-size:0.85rem; color:var(--muted); line-height:1.55; flex:1; }
    .card-arr { font-size:0.82rem; color:var(--accent); opacity:0; transition:opacity 0.2s; margin-top:auto; }
    .card:hover .card-arr { opacity:1; }

    /* ── DOT COLORS ── */
    .d-bilibili .sec-dot { background:#fb7299; }
    .d-creative .sec-dot { background:#f97316; }

    /* ── FOOTER ── */
    .foot {
      text-align:center; padding:18px 0;
      font-size:0.74rem; color:var(--muted);
      border-top:1px solid var(--line); margin-top:8px;
    }

    /* ── PASSWORD GATE ── */
    .pw-gate {
      position:fixed; inset:0; z-index:9999;
      display:flex; align-items:center; justify-content:center;
      background:var(--bg);
    }
    .pw-box {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px; padding:36px 32px;
      width:380px; max-width:92vw;
      box-shadow:0 8px 40px rgba(0,0,0,.35);
      text-align:center;
    }
    .pw-icon { font-size:2.4rem; margin-bottom:8px; }
    .pw-title { font-size:1.15rem; font-weight:700; margin-bottom:6px; color:var(--text); }
    .pw-sub { font-size:0.8rem; color:var(--muted); margin-bottom:22px; }
    .pw-input {
      width:100%; padding:10px 14px; border-radius:10px;
      border:1.5px solid var(--line); background:var(--bg-soft);
      color:var(--text); font-size:0.95rem; text-align:center;
      outline:none; font-family:inherit; letter-spacing:2px;
      transition:border-color 0.2s;
    }
    .pw-input:focus { border-color:var(--accent); }
    .pw-err { color:#ef4444; font-size:0.78rem; margin-top:8px; min-height:18px; }
    .pw-btn {
      margin-top:14px; width:100%; padding:10px;
      border-radius:10px; border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; font-size:0.95rem; font-weight:600;
      cursor:pointer; font-family:inherit;
      transition:opacity 0.2s;
    }
    .pw-btn:hover { opacity:0.88; }
    .pw-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .pw-input:disabled { opacity:0.4; cursor:not-allowed; }
    .pw-attempts { font-size:0.78rem; color:#fbbf24; margin-top:8px; min-height:18px; }
    .pw-locked { margin:8px 0; }
    .pw-lock-icon { font-size:2rem; margin-bottom:4px; }
    .pw-lock-title { font-size:1rem; font-weight:600; color:#f87171; margin-bottom:8px; }
    .pw-countdown { font-size:2rem; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; margin-bottom:6px; }
    .pw-lock-sub { font-size:0.78rem; color:var(--muted); }

    /* ── RESPONSIVE ── */
    @media (max-width:820px) { .grid { grid-template-columns:repeat(2, minmax(0,1fr)); } }
    @media (max-width:480px) { .grid { grid-template-columns:1fr; } .page { padding:20px 16px 40px; } }
  </style>
</head>
<body>

<!-- PASSWORD GATE -->
<div class="pw-gate" id="pwGate">
  <div class="pw-box">
    <div class="pw-icon">🔒</div>
    <div class="pw-title">访问验证</div>
    <div class="pw-sub">请输入访问密码</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="输入密码..." autofocus>
    <div class="pw-err" id="pwErr"></div>
    <div class="pw-locked" id="pwLocked" style="display:none">
      <div class="pw-lock-icon">⏳</div>
      <div class="pw-lock-title">密码错误次数过多，已锁定</div>
      <div class="pw-countdown" id="pwCountdown">03:00</div>
      <div class="pw-lock-sub">请等待倒计时结束后重试</div>
    </div>
    <div class="pw-attempts" id="pwAttempts"></div>
    <button class="pw-btn" id="pwBtn" onclick="checkPw()">验证</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="pageContent" style="display:none">

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="logo">超红</div>
      <div class="brand-text">
        <h1>OKR 目标管理</h1>
        <span>超红传媒 · 团队目标与关键结果</span>
      </div>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️ 浅色</button>
  </div>

  <!-- NAV PILLS -->
  <div class="nav-links">
    <span class="nav-pill active">🎯 OKR 目标管理</span>
  </div>

  <!-- B站事业部 -->
  <div class="sec d-bilibili">
    <div class="sec-head">
      <div class="sec-dot"></div>
      <span class="sec-title">B站事业部</span>
      <span class="sec-count">2 篇</span>
    </div>
    <div class="grid">
      <a class="card" href="okr-bilibili-annual.html" target="_blank">
        <div class="card-row">
          <span class="card-icon">📅</span>
          <span class="card-name">年度&月度 OKR</span>
        </div>
        <div class="card-desc">B站事业部全年目标拆解与月度关键结果追踪</div>
        <div class="card-arr">打开 →</div>
      </a>
      <a class="card" href="okr-bilibili-start.html" target="_blank">
        <div class="card-row">
          <span class="card-icon">🚀</span>
          <span class="card-name">从零到一 OKR</span>
        </div>
        <div class="card-desc">B站事业部从零起步阶段的目标规划与里程碑</div>
        <div class="card-arr">打开 →</div>
      </a>
    </div>
  </div>

  <!-- 创作团队 -->
  <div class="sec d-creative">
    <div class="sec-head">
      <div class="sec-dot"></div>
      <span class="sec-title">创作团队</span>
      <span class="sec-count">1 篇</span>
    </div>
    <div class="grid">
      <a class="card" href="okr-creative-annual.html" target="_blank">
        <div class="card-row">
          <span class="card-icon">✍️</span>
          <span class="card-name">年度&月度 OKR</span>
        </div>
        <div class="card-desc">创作团队全年目标拆解与月度关键结果追踪</div>
        <div class="card-arr">打开 →</div>
      </a>
    </div>
  </div>

  <div class="foot">超红传媒 &nbsp;·&nbsp; OKR 目标管理 &nbsp;·&nbsp; 3 篇 &nbsp;·&nbsp; 2026</div>

</div><!-- /page -->

</div><!-- /pageContent -->

<script>
  var CORRECT_PW = 'ch2026';
  var MAX_TRIES = 3;
  var LOCK_SECS = 180;
  var AUTH_EXPIRY_MS = 10 * 60 * 1000;
  var FAILS_KEY = 'chaohong-pw-fails';
  var AUTH_KEY = 'chaohong-shared-auth';
  var countdownTimer = null;

  function getFails() {
    try { return JSON.parse(localStorage.getItem(FAILS_KEY)) || {count:0, lockUntil:0}; }
    catch(e) { return {count:0, lockUntil:0}; }
  }
  function saveFails(f) { localStorage.setItem(FAILS_KEY, JSON.stringify(f)); }

  function getAuth() {
    try { var a = JSON.parse(localStorage.getItem(AUTH_KEY)); return a && a.expires > Date.now() ? a : null; }
    catch(e) { return null; }
  }

  var pwGate = document.getElementById('pwGate');
  var pwContent = document.getElementById('pageContent');
  var pwInput = document.getElementById('pwInput');
  var pwErr = document.getElementById('pwErr');
  var pwBtn = document.getElementById('pwBtn');
  var pwLocked = document.getElementById('pwLocked');
  var pwCountdown = document.getElementById('pwCountdown');
  var pwAttempts = document.getElementById('pwAttempts');

  function showLocked(lockUntil) {
    pwInput.style.display = 'none';
    pwBtn.style.display = 'none';
    pwErr.textContent = '';
    pwAttempts.textContent = '';
    pwLocked.style.display = 'block';
    updateCountdown(lockUntil);
  }

  function updateCountdown(lockUntil) {
    clearInterval(countdownTimer);
    function tick() {
      var remain = Math.max(0, Math.ceil((lockUntil - Date.now()) / 1000));
      var m = Math.floor(remain / 60);
      var s = remain % 60;
      pwCountdown.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      if (remain <= 0) {
        clearInterval(countdownTimer);
        unlockInput();
      }
    }
    tick();
    countdownTimer = setInterval(tick, 200);
  }

  function unlockInput() {
    pwLocked.style.display = 'none';
    pwInput.style.display = '';
    pwBtn.style.display = '';
    pwInput.disabled = false;
    pwBtn.disabled = false;
    pwErr.textContent = '';
    pwAttempts.textContent = '';
    pwInput.value = '';
    pwInput.focus();
    saveFails({count:0, lockUntil:0});
  }

  function checkPw() {
    if (pwInput.value === CORRECT_PW) {
      localStorage.setItem(AUTH_KEY, JSON.stringify({expires: Date.now() + AUTH_EXPIRY_MS}));
      localStorage.removeItem(FAILS_KEY);
      pwGate.style.display = 'none';
      pwContent.style.display = 'block';
      return;
    }
    var f = getFails();
    f.count = (f.count || 0) + 1;
    if (f.count >= MAX_TRIES) {
      f.lockUntil = Date.now() + LOCK_SECS * 1000;
      saveFails(f);
      showLocked(f.lockUntil);
      pwInput.disabled = true;
      pwBtn.disabled = true;
    } else {
      saveFails(f);
      var left = MAX_TRIES - f.count;
      pwErr.textContent = '密码错误，还剩 ' + left + ' 次尝试机会';
      pwAttempts.textContent = '';
      pwInput.value = '';
      pwInput.focus();
    }
  }

  pwInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPw();
  });

  // Init — check shared auth first, then fails lock
  (function() {
    var auth = getAuth();
    if (auth) {
      pwGate.style.display = 'none';
      pwContent.style.display = 'block';
      return;
    }
    var f = getFails();
    if (f.lockUntil && f.lockUntil > Date.now()) {
      showLocked(f.lockUntil);
      pwInput.disabled = true;
      pwBtn.disabled = true;
    }
  })();

  /* ── THEME ── */
  (function() {
    const saved = localStorage.getItem('chaohong-okr-theme');
    const theme = saved || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    updateBtn(theme);
  })();

  function updateBtn(theme) {
    const btn = document.getElementById('themeBtn');
    if (!btn) return;
    btn.textContent = theme === 'dark' ? '☀️ 浅色' : '🌙 深色';
  }

  function toggleTheme() {
    const html = document.documentElement;
    const cur = html.getAttribute('data-theme') || 'dark';
    const next = cur === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('chaohong-okr-theme', next);
    updateBtn(next);
  }
</script>
</body>
</html>
